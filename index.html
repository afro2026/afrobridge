<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AfroBridge | Connexion Diplomatique & Agricole</title>

    <!-- SEO -->
    <meta name="description" content="AfroBridge connecte les producteurs ivoiriens aux marchés internationaux.">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --vert-foret: #1b4332;
            --or-prestige: #d4af37;
            --blanc-pur: #ffffff;
            --gris-clair: #f8f9fa;
            --noir-texte: #2d3436;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { line-height: 1.6; scroll-behavior: smooth; }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 8%; background: white;
            position: sticky; top: 0;
        }

        .logo { font-weight: 700; font-size: 1.5rem; color: var(--vert-foret); }
        .logo span { color: var(--or-prestige); }

        .nav-links { display: flex; list-style: none; gap: 30px; }
        .nav-links a { text-decoration: none; color: var(--vert-foret); }

        .hero {
            height: 70vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                        url('cacao.jpg') center/cover;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column; color: white; text-align: center;
        }

        .section-padding { padding: 80px 8%; }

        .grid-products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: #f8f9fa;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
        }

        .card:hover { transform: translateY(-10px); }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .card-content { padding: 20px; text-align: center; }

        .contact-container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
        }

        .btn-submit {
            background: var(--vert-foret);
            color: white;
            padding: 12px;
            border: none;
            cursor: pointer;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #111;
            color: white;
        }
    </style>
</head>

<body>

<nav>
    <div class="logo">Afro<span>Bridge</span></div>
    <ul class="nav-links">
        <li><a href="#">Accueil</a></li>
        <li><a href="#produits">Produits</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>
</nav>

<section class="hero">
    <h1>Le Pont entre l’Afrique et le Monde</h1>
</section>

<section class="section-padding" id="produits">
    <h2 style="text-align:center;">Nos Produits</h2>

    <div class="grid-products">

        <!-- CACAO -->
        <div class="card">
            <img src="cacao.jpg" alt="Cacao" loading="lazy">
            <div class="card-content">
                <h3>Cacao</h3>
                <p>Fèves de cacao de qualité premium.</p>
            </div>
        </div>

        <!-- CAFÉ -->
        <div class="card">
            <img src="cafe.jpg" alt="Café" loading="lazy">
            <div class="card-content">
                <h3>Café</h3>
                <p>Grains soigneusement sélectionnés.</p>
            </div>
        </div>

        <!-- ANACARDE -->
        <div class="card">
            <img src="anacarde.jpg" alt="Anacarde" loading="lazy">
            <div class="card-content">
                <h3>Anacarde</h3>
                <p>Noix de cajou de haute qualité.</p>
            </div>
        </div>

    </div>
</section>

<section class="section-padding" id="contact">
    <h2 style="text-align:center;">Contact</h2>

    <div class="contact-container">
        <form id="contactForm">
            <input type="text" placeholder="Nom" required>
            <input type="text" placeholder="Prénom" required>

            <select>
                <option>Acheteur</option>
                <option>Vendeur</option>
            </select>

            <select>
                <option>Anacarde</option>
                <option>Café</option>
                <option>Cacao</option>
            </select>

            <button class="btn-submit">Envoyer</button>
        </form>
    </div>
</section>

<footer>
    AfroBridge © 2026
</footer>

<script>
// formulaire
document.getElementById("contactForm").addEventListener("submit", function(e){
    e.preventDefault();
    alert("Demande envoyée !");
});

// scroll fluide
document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', function(e) {
        e.preventDefault();
        document.querySelector(this.getAttribute('href'))
            .scrollIntoView({ behavior: 'smooth' });
    });
});
</script>

</body>
</html>
